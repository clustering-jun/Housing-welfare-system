<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 기반 맞춤형 주거복지 지원 플랫폼</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="shell-header">
    <div>
      <p class="eyebrow">주택관리공단</p>
      <h1>AI 기반 맞춤형 주거복지 지원 플랫폼</h1>
      <p class="summary">공공데이터 기반 주거복지 사각지대 탐지 및 프로그램 추천 시스템</p>
    </div>
  </header>

  <main class="system-grid">
    <a class="system-card primary" href="./blindspot/">
      <span class="card-kicker">Detection</span>
      <strong>주거복지 사각지대 탐지 대시보드</strong>
      <span>공공 데이터를 기반으로한 단지별 취약도, 지역별 분포, 지표 가중치, 클러스터링 결과를 확인할 수 있습니다.</span>
      <em>열기</em>
    </a>

    <a class="system-card" href="./recsys/">
      <span class="card-kicker">Recommendation</span>
      <strong>복지 프로그램 추천 시스템</strong>
      <span>주거복지 사각지대 탐지 결과와 단지별 특성을 바탕으로 맞춤형 복지 프로그램을 추천받을 수 있습니다.</span>
      <em>열기</em>
    </a>
  </main>
</body>
</html>
